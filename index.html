function generateShareUrl() {
  const data = getShareData();
  const json = JSON.stringify(data);
  const encoded = btoa(unescape(encodeURIComponent(json)));
  const url = location.origin + location.pathname + '#' + encoded;
  navigator.clipboard.writeText(url).then(()=>showToast('共有URLをコピーしました！')).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=url;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    showToast('共有URLをコピーしました！');
  });
}

function loadFromUrl() {
  if (!location.hash || location.hash.length < 2) return false;
  try {
    const encoded = location.hash.slice(1);
    const json = decodeURIComponent(escape(atob(encoded)));
    const data = JSON.parse(json);

    // Restore basic info
    if (data.date) document.getElementById('match-date').value = data.date;
    if (data.tournament) document.getElementById('tournament-name').value = data.tournament;
    if (data.venue) document.getElementById('venue').value = data.venue;
    if (data.type) {
      document.querySelectorAll('#match-type-options .chip').forEach(c => {
        c.classList.toggle('active', c.dataset.val === data.type);
      });
    }
    if (data.formatMinutes) formatMinutes = data.formatMinutes;
    if (data.formatPeriods) formatPeriods = data.formatPeriods;
    if (data.weather) {
      currentWeather = data.weather;
      const wd = document.getElementById('weather-display');
      const wb = document.getElementById('weather-btn');
      if (wd) wd.textContent = currentWeather;
      if (wb) { wb.textContent = '🌤️ 再取得'; }
    }

    // Restore matches
    if (data.matches && data.matches.length > 0) {
      matches = [];
      matchCounter = 0;
      document.getElementById('matches-container').innerHTML = '';
      data.matches.forEach(md => {
        matchCounter++;
        const m = {
          id: matchCounter,
          opponent: md.opponent || '',
          oppMode: md.opponent ? 'prev' : 'new',
          players: md.players || [],
          gk: md.gk,
          scoreUs: md.scoreUs || 0,
          scoreOpponent: md.scoreOpponent || 0,
          scoreUsFirst: md.scoreUsFirst || 0,
          scoreOppFirst: md.scoreOppFirst || 0,
          scoreUsSecond: md.scoreUsSecond || 0,
          scoreOppSecond: md.scoreOppSecond || 0,
          scorers: md.scorers || {},
          goalSequence: md.goalSequence ? (Array.isArray(md.goalSequence) ? md.goalSequence : Object.values(md.goalSequence)) : [],
          showSub: md.showSub || false,
          subMode: md.subMode || 'individual',
          subs: md.subs || [],
          subGkChange: md.subGkChange,
          swapPlayers: md.swapPlayers || [],
          swapGk: md.swapGk,
          memo: md.memo || '',
          showPK: md.showPK || false,
          pkOurs: md.pkOurs || [],
          pkTheirs: md.pkTheirs || [],
          customFormat: md.customFormat || false,
          customMinutes: md.customMinutes || 15,
          customPeriods: md.customPeriods || 1,
          formationFirst: md.formationFirst || md.formation || null, // 旧形式互換
          formationSecond: md.formationSecond || null,
          formationType: md.formationType || '3-2-2'
        };
        matches.push(m);
        renderMatch(m);
        // Restore UI state
        document.getElementById(`score-us-${m.id}`).value = m.scoreUs;
        document.getElementById(`score-opp-${m.id}`).value = m.scoreOpponent;
        updateScore(m.id);
      refreshHalfUI(m.id);
      if (isHalfMatch(m)) {
        document.getElementById(`score-us-first-${m.id}`).value = m.scoreUsFirst;
        document.getElementById(`score-opp-first-${m.id}`).value = m.scoreOppFirst;
        document.getElementById(`score-us-second-${m.id}`).value = m.scoreUsSecond;
        document.getElementById(`score-opp-second-${m.id}`).value = m.scoreOppSecond;
      }
        if (m.memo) document.getElementById(`memo-${m.id}`).value = m.memo;
        if (m.showSub) {
          document.getElementById(`sub-${m.id}`).style.display = 'block';
          document.getElementById(`sub-toggle-${m.id}`).textContent = '－ 交代を閉じる';
          if (m.subMode === 'fullswap') setSubMode(m.id, 'fullswap');
          else renderSubRows(m.id);
        }
        if (m.showPK) {
          document.getElementById(`pk-content-${m.id}`).style.display = 'block';
          document.getElementById(`pk-toggle-${m.id}`).textContent = '－ PK戦を閉じる';
          renderPK(m.id);
        }
        if (m.customFormat) {
          document.getElementById(`custom-format-${m.id}`).checked = true;
          document.getElementById(`custom-format-area-${m.id}`).style.display = 'block';
          document.getElementById(`custom-min-${m.id}`).value = m.customMinutes;
          document.getElementById(`custom-per-${m.id}`).value = m.customPeriods;
        }
      });
      return true;
    }
  } catch(e) { console.log('URL parse error', e); }
  return false;
}

// ========== Firebase REST API Sync ==========

function debugLog(msg) {
  console.log('[sync]', msg);
}

// --- REST API helpers ---
function firebaseDataUrl() {
  return `${FIREBASE_URL}/rooms/${currentRoom}/data.json`;
}
function firebasePresenceUrl() {
  return `${FIREBASE_URL}/rooms/${currentRoom}/presence.json`;
}
function firebaseMyPresenceUrl() {
  return `${FIREBASE_URL}/rooms/${currentRoom}/presence/${myUserId}.json`;
}

async function firebaseGet(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function firebasePut(url, data) {
  const res = await fetch(url, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function firebaseDelete(url) {
  const res = await fetch(url, { method: 'DELETE' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

// --- Join / Leave ---
function joinToday(num) {
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  document.getElementById('room-id').value = today + '_' + num;
  joinRoom();
}

function joinFromSelect() {
  const id = document.getElementById('room-id-select').value;
  if (!id) return;
  document.getElementById('room-id').value = id;
  joinRoom();
}

async function toggleOtherDate() {
  const row = document.getElementById('other-date-row');
  const isHidden = row.style.display === 'none';
  row.style.display = isHidden ? 'block' : 'none';
  if (isHidden) {
    const sel = document.getElementById('room-id-select');
    sel.innerHTML = '<option value="">読み込み中...</option>';
    try {
      const rooms = await firebaseGet(FIREBASE_URL + '/rooms.json?shallow=true');
      const keys = Object.keys(rooms || {}).sort().reverse();
      // 各ルームのdate/type/tournamentを取得
      const items = [];
      for (const k of keys) {
        try {
          const d = await firebaseGet(FIREBASE_URL + '/rooms/' + k + '/data.json');
          if (d && d.matches) {
            const date = (d.date || k).replace(/^(\d{4})-?(\d{2})-?(\d{2})/, '$1/$2/$3');
            const suffix = k.endsWith('_1') ? ' ①' : k.endsWith('_2') ? ' ②' : '';
            const type = d.type || '';
            const tournament = d.tournament || '';
            const label = `${date}${suffix} ${type} ${tournament}`.trim();
            items.push({key: k, label});
          }
        } catch(e) {}
      }
      if (items.length > 0) {
        sel.innerHTML = '<option value="">-- 試合を選択 --</option>';
        items.forEach(it => { sel.innerHTML += `<option value="${it.key}">${it.label}</option>`; });
      } else {
        sel.innerHTML = '<option value="">過去の試合はありません</option>';
      }
    } catch(e) {
      sel.innerHTML = '<option value="">取得できませんでした</option>';
    }
  }
}

function joinRoom() {
  const roomId = document.getElementById('room-id').value.trim();
  if (!roomId) return;
  currentRoom = roomId;

  document.getElementById('room-join').style.display = 'none';
  document.getElementById('room-status').style.display = 'block';
  const displayName = roomId.endsWith('_1') ? '試合①' : roomId.endsWith('_2') ? '試合②' : roomId;
  document.getElementById('room-name').textContent = displayName;

  isEditor = true;  // 全員エディター
  setRoleDisplay('editor');
  sessionStorage.setItem('match-log-room', JSON.stringify({ roomId, role: 'editor' }));
  // コンテンツエリアを解放
  const ca = document.getElementById('content-area');
  if (ca) { ca.style.opacity = '1'; ca.style.pointerEvents = 'auto'; }
  const hint = document.getElementById('join-hint');
  if (hint) hint.style.display = 'none';
  debugLog('ルーム参加: ' + roomId);

  // UIをリセット（前のルームのデータが残らないように）
  // リセット中はsyncが走らないようにcurrentRoomを一時退避
  const savedRoom = currentRoom;
  currentRoom = null;
  if (syncTimer) { clearTimeout(syncTimer); syncTimer = null; }
  matches = [];
  matchCounter = 0;
  document.getElementById('matches-container').innerHTML = '';
  document.getElementById('match-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('tournament-name').value = '';
  document.getElementById('venue').value = '';
  currentWeather = '';
  const wd = document.getElementById('weather-display');
  if (wd) wd.textContent = '';
  const wb = document.getElementById('weather-btn');
  if (wb) wb.textContent = '🌤️ 現在地の天気を取得';
  document.querySelectorAll('#match-type-options .chip').forEach(c => c.classList.toggle('active', c.dataset.val === 'TM'));
  currentRoom = savedRoom;

  // Load existing data
  firebaseGet(firebaseDataUrl()).then(data => {
    if (data) {
      loadFromFirebase(data);
      debugLog('既存データ読込完了');
    } else {
      // 新規ルーム: 空の試合を1つ追加
      addMatch();
      debugLog('新規ルーム');
    }

    // Register presence
    registerPresence();

    // 全員ポーリング（編集者も他の編集者の変更を受信）
    lastDataHash = JSON.stringify(data || '');
    startPolling();
  }).catch(err => {
    debugLog('接続エラー: ' + err.message);
    alert('接続エラー: ' + err.message);
    leaveRoom();
  });
}

function leaveRoom() {
  // Remove presence
  if (currentRoom && myUserId) {
    firebaseDelete(firebaseMyPresenceUrl()).catch(() => {});
  }
  stopPolling();
  sessionStorage.removeItem('match-log-room');
  currentRoom = null;
  document.getElementById('room-join').style.display = 'block';
  document.getElementById('room-status').style.display = 'none';
  document.getElementById('presence-count').textContent = '';
  document.getElementById('connection-status').textContent = '';
  // コンテンツエリアをグレーアウトに戻す
  const ca = document.getElementById('content-area');
  if (ca) { ca.style.opacity = '0.4'; ca.style.pointerEvents = 'none'; }
  const hint = document.getElementById('join-hint');
  if (hint) hint.style.display = 'block';
}

// --- Presence ---
function registerPresence() {
  if (!currentRoom || !myUserId) return;
  firebasePut(firebaseMyPresenceUrl(), {
    role: isEditor ? 'editor' : 'viewer',
    joinedAt: Date.now()
  }).catch(err => debugLog('presence登録エラー: ' + err.message));
}

async function fetchPresence() {
  try {
    const data = await firebaseGet(firebasePresenceUrl());
    updatePresenceDisplay(data);
  } catch(e) { /* ignore */ }
}

function updatePresenceDisplay(presenceData) {
  const countEl = document.getElementById('presence-count');
  if (!countEl) return;
  if (!presenceData) { countEl.textContent = ''; return; }

  const users = Object.values(presenceData);
  const total = users.length;
  const editors = users.filter(u => u.role === 'editor').length;
  const viewers = total - editors;

  let text = `👥 ${total}人が参加中`;
  if (editors > 0 && viewers > 0) {
    text += `（編集者${editors}人）`;
  }
  countEl.textContent = text;
}

function setRoleDisplay() {
  const descEl = document.getElementById('room-desc');
  const syncBar = document.getElementById('sync-bar');
  const dot = document.getElementById('connection-dot');
  if (descEl) descEl.textContent = '入力すると自動で共有されます';
  if (syncBar) syncBar.style.display = 'flex';
  if (dot) dot.style.background = '#27ae60';
}

// --- Sync Status ---
function updateSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  if (state === 'sending') {
    el.textContent = '📤 送信中...';
    el.style.color = '#f59e0b';
  } else if (state === 'ok') {
    el.textContent = '✅ 同期済み';
    el.style.color = '#27ae60';
  } else if (state === 'error') {
    el.textContent = '❌ 送信失敗（ボタンで再送）';
    el.style.color = '#e74c3c';
  } else if (state === 'pending') {
    el.textContent = '⏳ 未送信の変更あり';
    el.style.color = '#f59e0b';
  }
}

// --- Editor: Send data ---
let isSyncing = false;
let lastSyncTime = 0;  // sync後のクールダウン用

function manualSync() {
  if (!currentRoom) return;
  if (syncTimer) { clearTimeout(syncTimer); syncTimer = null; }
  syncToFirebase();
}

async function syncToFirebase() {
  if (!currentRoom) return;
  if (isSyncing) return;  // 二重送信防止
  isSyncing = true;
  updateSyncStatus('sending');
  debugLog('送信中...');

  const data = getShareData();
  try {
    await firebasePut(firebaseDataUrl(), data);
    debugLog('送信完了 ✅');
    updateSyncStatus('ok');
    // Firebaseが返す形式でhash更新（配列→オブジェクト変換後の形式に合わせる）
    const saved = await firebaseGet(firebaseDataUrl());
    lastDataHash = JSON.stringify(saved || '');
    lastSyncTime = Date.now();
  } catch(err) {
    debugLog('送信エラー: ' + err.message);
    updateSyncStatus('error');
  } finally {
    isSyncing = false;
  }
}

// --- Viewer: Poll for updates ---
function startPolling() {
  stopPolling();
  pollTimer = setInterval(() => pollFirebase(), 3000);
  debugLog('ポーリング開始（3秒間隔）');
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function pollFirebase() {
  if (!currentRoom) return;
  // 編集者が変更中（未送信 or 送信中）のときはスキップ
  if (isEditor && (syncTimer || isSyncing)) {
    debugLog('ポーリングスキップ（ローカル変更中）');
    return;
  }
  try {
    const data = await firebaseGet(firebaseDataUrl());
    const hash = JSON.stringify(data || '');
    if (hash !== lastDataHash) {
      lastDataHash = hash;
      // 自分がsyncした直後5秒間はUI再構築しない（hash同期のズレ対策）
      if (Date.now() - lastSyncTime < 5000) {
        debugLog('sync直後 - hashのみ更新');
      } else if (data) {
        loadFromFirebase(data);
        debugLog('データ更新受信');
      }
    }
    // Presence も更新
    fetchPresence();
    // 接続OKの表示
    const dot = document.getElementById('connection-dot');
    if (dot) dot.style.background = '#27ae60';
    document.getElementById('connection-status').textContent = '';
  } catch(err) {
    debugLog('ポーリングエラー: ' + err.message);
    const dot = document.getElementById('connection-dot');
    if (dot) dot.style.background = '#f39c12';
    document.getElementById('connection-status').textContent = '⚠️ 接続エラー';
  }
}

// --- Load data into UI ---
let isLoadingRemote = false;  // loadFromFirebase中はscheduleSync抑止

function loadFromFirebase(data) {
  isLoadingRemote = true;
  debugLog('loadFromFirebase開始');

  if (data.date) document.getElementById('match-date').value = data.date;
  if (data.tournament) document.getElementById('tournament-name').value = data.tournament;
  if (data.venue) document.getElementById('venue').value = data.venue;
  if (data.type) {
    document.querySelectorAll('#match-type-options .chip').forEach(c => {
      c.classList.toggle('active', c.dataset.val === data.type);
    });
  }
  if (data.formatMinutes) formatMinutes = data.formatMinutes;
  if (data.formatPeriods) formatPeriods = data.formatPeriods;

  // Firebaseは配列をオブジェクトに変換するので、配列に戻す
  let matchesData = data.matches;
  if (matchesData && !Array.isArray(matchesData)) {
    matchesData = Object.values(matchesData);
  }

  debugLog('matches数: ' + (matchesData ? matchesData.length : 0));

  if (matchesData && matchesData.length > 0) {
    matches = [];
    matchCounter = 0;
    document.getElementById('matches-container').innerHTML = '';
    matchesData.forEach(md => {
      matchCounter++;
      const m = {
        id: matchCounter,
        opponent: md.opponent || '',
        oppMode: md.opponent ? 'prev' : 'new',
        players: md.players || [],
        gk: md.gk,
        scoreUs: md.scoreUs || 0,
        scoreOpponent: md.scoreOpponent || 0,
        scorers: md.scorers || {},
        goalSequence: md.goalSequence ? (Array.isArray(md.goalSequence) ? md.goalSequence : Object.values(md.goalSequence)) : [],
        showSub: md.showSub || false,
        subMode: md.subMode || 'individual',
        subs: md.subs || [],
        subGkChange: md.subGkChange,
        swapPlayers: md.swapPlayers || [],
        swapGk: md.swapGk,
        memo: md.memo || '',
        showPK: md.showPK || false,
        pkOurs: md.pkOurs || [],
        pkTheirs: md.pkTheirs || [],
        customFormat: md.customFormat || false,
        customMinutes: md.customMinutes || 15,
        customPeriods: md.customPeriods || 1,
        formationFirst: md.formationFirst || md.formation || null,
        formationSecond: md.formationSecond || null,
        formationType: md.formationType || '3-2-2'
      };
      matches.push(m);
      renderMatch(m);
      document.getElementById(`score-us-${m.id}`).value = m.scoreUs;
      document.getElementById(`score-opp-${m.id}`).value = m.scoreOpponent;
      updateScore(m.id);
      refreshHalfUI(m.id);
      if (isHalfMatch(m)) {
        document.getElementById(`score-us-first-${m.id}`).value = m.scoreUsFirst;
        document.getElementById(`score-opp-first-${m.id}`).value = m.scoreOppFirst;
        document.getElementById(`score-us-second-${m.id}`).value = m.scoreUsSecond;
        document.getElementById(`score-opp-second-${m.id}`).value = m.scoreOppSecond;
      }
      if (m.memo) document.getElementById(`memo-${m.id}`).value = m.memo;
      if (m.showSub) {
        document.getElementById(`sub-${m.id}`).style.display = 'block';
        document.getElementById(`sub-toggle-${m.id}`).textContent = '－ 交代を閉じる';
        if (m.subMode === 'fullswap') setSubMode(m.id, 'fullswap');
        else renderSubRows(m.id);
      }
      if (m.showPK) {
        document.getElementById(`pk-content-${m.id}`).style.display = 'block';
        document.getElementById(`pk-toggle-${m.id}`).textContent = '－ PK戦を閉じる';
        renderPK(m.id);
      }
      if (m.customFormat) {
        document.getElementById(`custom-format-${m.id}`).checked = true;
        document.getElementById(`custom-format-area-${m.id}`).style.display = 'block';
        document.getElementById(`custom-min-${m.id}`).value = m.customMinutes;
        document.getElementById(`custom-per-${m.id}`).value = m.customPeriods;
      }
    });
    debugLog('読込完了: ' + matches.length + '試合');
  }
  isLoadingRemote = false;
}

// --- Auto-sync on changes (debounced) ---
let syncTimer = null;
function scheduleSync() {
  if (!currentRoom) return;
  if (isLoadingRemote) return;  // リモートデータ読込中は送信しない
  if (!isEditor) return;
  updateSyncStatus('pending');
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(() => {
    debugLog('変更検知、送信予定');
    syncToFirebase();
  }, 1000);
}

// ========== Formation ==========
// rows: FW(top) -> MF -> DF -> GK(bottom) の順で表示
const FORMATIONS = {
  '3-2-2': { name: '3-2-2', rows: [{pos:'FW',count:2}, {pos:'MF',count:2}, {pos:'DF',count:3}, {pos:'GK',count:1}] },
  '3-3-1': { name: '3-3-1', rows: [{pos:'FW',count:1}, {pos:'MF',count:3}, {pos:'DF',count:3}, {pos:'GK',count:1}] },
  '2-3-2': { name: '2-3-2', rows: [{pos:'FW',count:2}, {pos:'MF',count:3}, {pos:'DF',count:2}, {pos:'GK',count:1}] },
};
let formationModal = null;
let formationMatchId = null;
let formationType = '3-2-2';
let formationSlots = []; // [{pos, num}]
let selectingSlot = null;
let currentHalf = 'first'; // 'first' or 'second'

function openFormation(matchId) {
  const m = getMatch(matchId);
  const total = m.players.length + (m.gk ? 1 : 0);
  if (total < 1) {
    showToast('先に選手を選んでね');
    return;
  }
  formationMatchId = matchId;
  formationType = m.formationType || '3-2-2';
  currentHalf = 'first'; // 常に前半から開始
  loadFormationForHalf(m, 'first');
  selectingSlot = null;
  renderFormationModal();
}

function loadFormationForHalf(m, half) {
  const formation = half === 'first' ? m.formationFirst : m.formationSecond;
  if (formation && formation.length > 0) {
    // 既に保存済みの配置があればそれを使う
    formationSlots = [...formation];
  } else if (half === 'second') {
    // 後半の新規入力
    const hasSubs = hasSubstitutions(m);
    if (!hasSubs && m.formationFirst && m.formationFirst.length > 0) {
      // 交代なし → 前半の配置をそのままコピー
      formationSlots = [...m.formationFirst];
    } else {
      // 交代あり → GKだけ引き継いで、他は空から
      formationSlots = [];
      // GKを決定（交代でGK変わってたら新GK、変わってなければ前半のGK）
      let gkNum = m.subGkChange || m.gk;
      if (gkNum) {
        formationSlots.push({pos: 'GK', num: gkNum});
      }
    }
  } else {
    // 前半の新規入力
    formationSlots = [];
    if (m.gk) formationSlots.push({pos: 'GK', num: m.gk});
  }
}

function hasSubstitutions(m) {
  // 交代があるかチェック
  if (!m.showSub) return false;
  if (m.subMode === 'individual') {
    const validSubs = m.subs.filter(s => s.out !== null && s.in !== null);
    return validSubs.length > 0;
  }
  if (m.subMode === 'fullswap') {
    return m.swapPlayers && m.swapPlayers.length > 0;
  }
  return false;
}

function getMatchPeriods(m) {
  // 試合が何本制か判定
  if (m.customFormat) {
    return m.customPeriods;
  }
  return formatPeriods;
}

function renderFormationModal() {
  if (formationModal) formationModal.remove();

  const m = getMatch(formationMatchId);
  const periods = getMatchPeriods(m);
  const isMultiPeriod = periods >= 2;

  // 後半用の選手リスト（交代を反映）
  let allPlayers = [...m.players];
  if (m.gk) allPlayers.push(m.gk);

  if (currentHalf === 'second' && m.showSub && m.subMode === 'individual') {
    // 交代で入った選手を追加、出た選手を除外
    const validSubs = m.subs.filter(s => s.out !== null && s.in !== null);
    validSubs.forEach(sub => {
      allPlayers = allPlayers.filter(n => n !== sub.out);
      if (!allPlayers.includes(sub.in)) allPlayers.push(sub.in);
    });
  }

  const usedNums = formationSlots.map(s => s.num);

  const f = FORMATIONS[formationType];

  // Half tabs (for multi-period matches)
  let tabsHtml = '';
  if (isMultiPeriod) {
    tabsHtml = `
      <div class="sub-mode-tabs" style="margin-bottom:12px;">
        <div class="sub-mode-tab ${currentHalf === 'first' ? 'active' : ''}" onclick="switchHalf('first')">前半</div>
        <div class="sub-mode-tab ${currentHalf === 'second' ? 'active' : ''}" onclick="switchHalf('second')">後半</div>
      </div>
    `;
  }

  // Build field (FW top, GK bottom)
  let fieldHtml = '';
  f.rows.forEach((rowDef) => {
    fieldHtml += '<div class="formation-row">';
    for (let i = 0; i < rowDef.count; i++) {
      const posId = rowDef.pos === 'GK' ? 'GK' : `${rowDef.pos}${i}`;
      const slot = formationSlots.find(s => s.pos === posId);
      const isGk = rowDef.pos === 'GK';

      let cls = 'formation-slot';
      if (slot) cls += ' filled';
      if (isGk && slot) cls += ' gk';
      if (selectingSlot === posId) cls += ' selecting';

      const displayName = slot ? getName(slot.num) : rowDef.pos;
      const displayNum = slot ? slot.num : '';

      fieldHtml += `<div class="${cls}" onclick="selectSlot('${posId}')">
        <span class="slot-name">${displayName}</span>
        ${displayNum ? `<span class="slot-num">${displayNum}</span>` : ''}
      </div>`;
    }
    fieldHtml += '</div>';
  });

  // Player picker - always visible
  let pickerHtml = '<div class="player-picker"><p style="font-size:12px;color:#666;margin-bottom:6px;text-align:center;">';
  if (selectingSlot) {
    pickerHtml += `<strong>${selectingSlot}</strong>に入る選手をタップ`;
  } else {
    pickerHtml += 'ポジションを選んでから選手をタップ';
  }
  pickerHtml += '</p><div class="picker-grid">';
  allPlayers.sort((a,b) => a-b).forEach(num => {
    const used = usedNums.includes(num);
    const isSelecting = selectingSlot !== null;
    // ポジション選択中なら、配置済み選手でもクリック可能（ポジション入れ替え用）
    const clickable = isSelecting;
    const isCurrentSlot = formationSlots.find(s => s.pos === selectingSlot && s.num === num);
    // usedでもポジション選択中ならクリック可能にする
    const usedStyle = used && isSelecting ? 'opacity:0.5;pointer-events:auto;cursor:pointer;' : '';
    const disabledStyle = !isSelecting ? 'opacity:0.5;cursor:default;' : '';
    pickerHtml += `<div class="picker-chip ${used && !isCurrentSlot ? 'used' : ''} ${!isSelecting ? 'disabled' : ''}"
      onclick="${clickable ? `assignSlot(${num})` : ''}"
      style="${usedStyle}${disabledStyle}">${getName(num)}(${num})</div>`;
  });
  pickerHtml += '</div></div>';

  // Output preview
  let outputHtml = '';
  if (formationSlots.length === 8) {
    outputHtml = `<div class="formation-output">${generateFormationText()}</div>`;
  }

  const modal = document.createElement('div');
  modal.className = 'formation-modal';
  const halfLabel = isMultiPeriod ? (currentHalf === 'first' ? '（前半）' : '（後半）') : '';
  modal.innerHTML = `
    <div class="formation-content">
      <div class="formation-title">⚽ フォーメーション配置${halfLabel}</div>
      ${tabsHtml}
      <div class="formation-select">
        ${Object.keys(FORMATIONS).map(k =>
          `<div class="formation-opt ${k===formationType?'active':''}" onclick="setFormationType('${k}')">${k}</div>`
        ).join('')}
      </div>
      <div class="formation-field">${fieldHtml}</div>
      ${pickerHtml}
      ${outputHtml}
      <div class="formation-actions">
        <button class="btn btn-secondary" onclick="closeFormation()">閉じる</button>
        <button class="btn btn-primary" onclick="saveFormation()" ${formationSlots.length < 8 ? 'disabled style="opacity:0.5"' : ''}>保存</button>
      </div>
    </div>
  `;
  modal.onclick = (e) => { if (e.target === modal) closeFormation(); };
  document.body.appendChild(modal);
  formationModal = modal;
}

function switchHalf(half) {
  if (currentHalf === half) return;

  // 現在の配置を保存
  const m = getMatch(formationMatchId);
  if (currentHalf === 'first') {
    m.formationFirst = [...formationSlots];
  } else {
    m.formationSecond = [...formationSlots];
  }

  // 切り替え
  currentHalf = half;
  loadFormationForHalf(m, half);
  selectingSlot = null;
  renderFormationModal();
}

function setFormationType(type) {
  formationType = type;
  // Keep GK, reset others
  formationSlots = formationSlots.filter(s => s.pos === 'GK');
  selectingSlot = null;
  renderFormationModal();
}

function selectSlot(posId) {
  selectingSlot = (selectingSlot === posId) ? null : posId;
  renderFormationModal();
}

function assignSlot(num) {
  if (!selectingSlot) return;
  // Remove if already placed elsewhere
  formationSlots = formationSlots.filter(s => s.num !== num);
  // Remove existing from this slot
  formationSlots = formationSlots.filter(s => s.pos !== selectingSlot);
  // Add
  formationSlots.push({pos: selectingSlot, num: num});
  selectingSlot = null;
  renderFormationModal();
}

function generateFormationText() {
  const f = FORMATIONS[formationType];
  let lines = [];

  f.rows.forEach((rowDef) => {
    let row = [];
    for (let i = 0; i < rowDef.count; i++) {
      const posId = rowDef.pos === 'GK' ? 'GK' : `${rowDef.pos}${i}`;
      const slot = formationSlots.find(s => s.pos === posId);
      if (slot) {
        row.push(rowDef.pos === 'GK' ? `GK${getName(slot.num)}` : getName(slot.num));
      } else {
        row.push('__');
      }
    }
    const rowStr = row.join('  ');
    const pad = Math.floor((24 - rowStr.length) / 2);
    lines.push(' '.repeat(Math.max(0, pad)) + rowStr);
  });

  return lines.join('\n');
}

function generateFormationTextForMatch(m, useNames, half = 'first') {
  // 指定されたハーフの配置を取得（互換性: m.formationがある場合は旧形式）
  let formation;
  if (half === 'first') {
    formation = m.formationFirst || m.formation;
  } else {
    formation = m.formationSecond;
  }

  if (!formation || !m.formationType) return '';
  const f = FORMATIONS[m.formationType];
  if (!f) return '';
  const fmt = n => useNames ? getName(n) : String(n);

  // 全角文字を考慮した表示幅
  const getWidth = (str) => {
    let w = 0;
    for (const c of str) w += c.match(/[^\x00-\x7F]/) ? 2 : 1;
    return w;
  };

  // 指定幅で中央揃え
  const padCenter = (str, width) => {
    const sw = getWidth(str);
    if (sw >= width) return str;
    const left = Math.floor((width - sw) / 2);
    return ' '.repeat(left) + str + ' '.repeat(width - sw - left);
  };

  const SLOT_WIDTH = 6;  // 各スロットの幅
  const TOTAL_WIDTH = 20; // 全体幅（3人×6 + スペース2）

  let lines = [];

  f.rows.forEach((rowDef) => {
    let slots = [];
    for (let i = 0; i < rowDef.count; i++) {
      const posId = rowDef.pos === 'GK' ? 'GK' : `${rowDef.pos}${i}`;
      const slot = formation.find(s => s.pos === posId);
      if (slot) {
        const name = rowDef.pos === 'GK' ? `GK${fmt(slot.num)}` : fmt(slot.num);
        slots.push(padCenter(name, SLOT_WIDTH));
      } else {
        slots.push(padCenter('__', SLOT_WIDTH));
      }
    }

    // 行を結合して全体を中央揃え
    const rowStr = slots.join('');
    const rowWidth = getWidth(rowStr);
    const leftPad = Math.floor((TOTAL_WIDTH - rowWidth) / 2);
    lines.push(' '.repeat(Math.max(0, leftPad)) + rowStr);
  });

  return lines.join('\n');
}

function hasFormation(m) {
  return (m.formationFirst && m.formationFirst.length === 8) ||
         (m.formationSecond && m.formationSecond.length === 8) ||
         (m.formation && m.formation.length === 8); // 旧形式互換
}

function saveFormation() {
  const m = getMatch(formationMatchId);
  const periods = getMatchPeriods(m);

  if (currentHalf === 'first') {
    m.formationFirst = [...formationSlots];
  } else {
    m.formationSecond = [...formationSlots];
  }
  m.formationType = formationType;

  const label = periods >= 2 ? (currentHalf === 'first' ? '前半' : '後半') : '';
  showToast(`${label}フォーメーション保存！`);
  closeFormation();
  scheduleSync();
}

function closeFormation() {
  if (formationModal) {
    formationModal.remove();
    formationModal = null;
  }
  formationMatchId = null;
  selectingSlot = null;
}

// ========== Weather ==========
let currentWeather = '';

const WMO_WEATHER = {
  0:'☀️ 快晴',1:'🌤️ 晴れ',2:'⛅ くもり時々晴れ',3:'☁️ くもり',
  45:'🌫️ 霧',48:'🌫️ 霧',
  51:'🌦️ 小雨',53:'🌧️ 雨',55:'🌧️ 強い雨',
  56:'🌧️ 雨(冷)',57:'🌧️ 強い雨(冷)',
  61:'🌧️ 小雨',63:'🌧️ 雨',65:'🌧️ 強い雨',
  66:'🌧️ 雨(冷)',67:'🌧️ 強い雨(冷)',
  71:'🌨️ 小雪',73:'🌨️ 雪',75:'🌨️ 大雪',77:'🌨️ 雪',
  80:'🌦️ にわか雨',81:'🌧️ にわか雨',82:'🌧️ 強いにわか雨',
  85:'🌨️ にわか雪',86:'🌨️ にわか雪',
  95:'⛈️ 雷雨',96:'⛈️ 雷雨(雹)',99:'⛈️ 雷雨(雹)'
};

async function fetchWeather() {
  const display = document.getElementById('weather-display');
  const btn = document.getElementById('weather-btn');
  if (!display) return;
  display.textContent = '取得中...';
  if (btn) btn.style.display = 'none';

  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, {timeout:10000, enableHighAccuracy:false});
    });
    const lat = pos.coords.latitude.toFixed(2);
    const lon = pos.coords.longitude.toFixed(2);

    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=Asia%2FTokyo`);
    const data = await res.json();
    const code = data.current.weather_code;
    const temp = Math.round(data.current.temperature_2m);
    const label = WMO_WEATHER[code] || '不明';
    currentWeather = `${label} ${temp}℃`;
    display.textContent = currentWeather;
    if (btn) { btn.textContent = '🌤️ 再取得'; btn.style.display = 'inline-block'; }
    scheduleSync();
  } catch(e) {
    const msg = e.code === 1 ? '📍 位置情報を許可してね'
              : e.code === 2 ? '📍 位置情報が取得できません'
              : e.code === 3 ? '⏱️ タイムアウト。もう一回押してね'
              : '取得できませんでした';
    display.textContent = msg;
    display.style.color = '#999';
    if (btn) { btn.textContent = '🌤️ 再取得'; btn.style.display = 'inline-block'; }
    debugLog('天気取得エラー: ' + e.message);
    setTimeout(() => { if (display.style.color === 'rgb(153, 153, 153)') display.style.color = ''; }, 5000);
  }
}

init();

function refreshData() {
  if (currentRoom) {
    if (isEditor) {
      // 編集者: ローカルを送信
      if (syncTimer) { clearTimeout(syncTimer); syncTimer = null; }
      syncToFirebase();
    } else {
      // 閲覧者: 最新データ取得
      pollFirebase();
    }
  } else {
    location.reload();
  }
  showToast('更新しました');
}
